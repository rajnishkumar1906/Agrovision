<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#leafGrad)" />
  
  <!-- Leaf shape -->
  <path d="M50 20 
           C50 20, 35 35, 35 50 
           C35 65, 50 80, 50 80 
           C50 80, 65 65, 65 50 
           C65 35, 50 20, 50 20Z" 
        fill="white" opacity="0.9" />
  
  <!-- Leaf vein -->
  <line x1="50" y1="25" x2="50" y2="75" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Small leaf veins -->
  <line x1="50" y1="40" x2="42" y2="45" stroke="#059669" stroke-width="1.5" stroke-linecap="round" />
  <line x1="50" y1="40" x2="58" y2="45" stroke="#059669" stroke-width="1.5" stroke-linecap="round" />
  <line x1="50" y1="55" x2="43" y2="60" stroke="#059669" stroke-width="1.5" stroke-linecap="round" />
  <line x1="50" y1="55" x2="57" y2="60" stroke="#059669" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Small dot/dew -->
  <circle cx="50" cy="65" r="2" fill="#10b981" opacity="0.6" />
</svg>