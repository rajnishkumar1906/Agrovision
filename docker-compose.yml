version: "3.9"

networks:
  agro-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:

  mongodb:
    image: mongo:7
    container_name: agro-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - agro-net
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: agro-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - agro-net
    ports:
      - "6379:6379"

  gateway:
    build:
      context: ./agri-microservice/gateway
    container_name: agro-gateway
    restart: unless-stopped
    env_file:
      - ./.env                         # loads PASETO_SECRET_KEY, etc.
    environment:
      REDIS_ENABLED: "false"
      PORT: 5001
      AUTH_SERVICE_URL: http://auth:4001
      HISTORY_SERVICE_URL: http://history:8003
      CROPREC_SERVICE_URL: http://croprec:8001
      DISEASE_SERVICE_URL: http://disease:8002
      KRISHIBOT_SERVICE_URL: http://krishibot:8003
    ports:
      - "3000:5001"
    depends_on:
      - auth
      - history
      - croprec
      - disease
      - krishibot
    networks:
      - agro-net

  auth:
    build:
      context: ./agri-microservice/auth-service
    container_name: agro-auth
    restart: unless-stopped
    env_file:
      - ./.env                         # loads PASETO_SECRET_KEY, PASETO_EXPIRE
    environment:
      MONGO_URI: mongodb://mongodb:27017/agro-auth
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      - mongodb
    networks:
      - agro-net

  history:
    build:
      context: ./agri-microservice/history-service
    container_name: agro-history
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/agro-history
      PORT: 8003
    ports:
      - "3002:8003"
    depends_on:
      - mongodb
    networks:
      - agro-net

  croprec:
    build:
      context: ./agri-microservice/crop-recomendation-system
    container_name: agro-croprec
    restart: unless-stopped
    ports:
      - "8001:8001"
    networks:
      - agro-net

  disease:
    build:
      context: ./agri-microservice/disease-detection
    container_name: agro-disease
    restart: unless-stopped
    ports:
      - "8002:8002"
    networks:
      - agro-net

  krishibot:
    build:
      context: ./agri-microservice/krishibot
    container_name: agro-krishibot
    restart: unless-stopped
    env_file:
      - ./agri-microservice/krishibot/krishibot.env
    ports:
      - "8003:8003"
    networks:
      - agro-net

  frontend:
    build:
      context: ./frontend
    container_name: agro-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - gateway
    networks:
      - agro-net